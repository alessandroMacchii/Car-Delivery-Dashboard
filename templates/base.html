<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title }} | Car Delivery Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    {% block head %}{% endblock %}
  </head>
  <body>
    <div class="page-shell">
      <header class="topbar">
        <a class="brand" href="{{ url_for('home') }}">
          <span class="brand-mark">CD</span>
          <span>
            <strong>Car Delivery</strong>
            <small>Dashboard gestione flotte</small>
          </span>
        </a>
        <nav class="topnav">
          <a href="{{ url_for('home') }}">Home</a>
          <a href="{{ url_for('gestione_auto') }}">Gestione auto</a>
          <a href="{{ url_for('catalogo') }}">Catalogo utenti</a>
          <a href="{{ url_for('auto_nuova') }}">Nuova auto</a>
        </nav>
      </header>

      <main>
        {% block content %}{% endblock %}
      </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    {% block scripts %}{% endblock %}
  </body>
</html>
